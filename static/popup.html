<!DOCTYPE html>
<html>
  <head>
    <title>Google Meet Helper</title>
    <style>
      .popup-header {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 8px;
      }

      .icon-button {
        border: 0;
        background: transparent;
        padding: 2px;
        cursor: pointer;
        line-height: 0;
      }

      .icon-button img {
        display: block;
        width: 18px;
        height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="popup-header">
      <button id="open-settings" class="icon-button" type="button" title="Open recorder settings" aria-label="Open recorder settings">
        <img src="gear.png" alt="" />
      </button>
    </div>
    <button id="save">Download Transcript</button>
    <hr/>
    <button id="enable-mic">Enable Microphone</button>
    <br/><br/>
    <label for="mic-mode">Microphone mode</label>
    <br/>
    <select id="mic-mode">
      <option value="off">Do not record microphone</option>
      <option value="mixed">Mix microphone into tab recording</option>
      <option value="separate" selected>Save microphone as separate audio file</option>
    </select>
    <hr/>
    <select id="storage-mode">
      <option value="local">Save to Local Disk (OPFS)</option>
      <option value="drive" selected>Save to Google Drive (after stop)</option>
    </select>
    <br/><br/>
    <label>
      <input type="checkbox" id="record-self-video" checked />
      Record my camera separately
    </label>
    <br/><br/>
    <button id="open-diagnostics" hidden>Open Diagnostics</button>
    <br/><br/>
    <div id="recording-status" style="min-height: 1.5em; font-size: 12px; color: #a15c00;"></div>
    <button id="start-rec">Start Recording</button>
    <button id="stop-rec" disabled>Stop Recording</button>
    <script src="popup.js"></script>
  </body>
</html>
