<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Mock Google Meet</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
      background: #101418;
      display: grid;
      place-items: center;
    }

    main {
      width: min(960px, calc(100vw - 32px));
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111827;
      border-radius: 8px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
    }

    [aria-label="Captions"] {
      margin-top: 16px;
      min-height: 72px;
    }

    .nMcdL {
      display: inline-block;
      min-width: 280px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.72);
    }

    .NWpY1d {
      margin-bottom: 4px;
      color: #8ab4f8;
      font-weight: 700;
    }

    .ygicle {
      font-size: 18px;
      line-height: 1.35;
    }

    #ended-state {
      margin-top: 16px;
      color: #fca5a5;
      font-size: 18px;
      font-weight: 700;
    }

    #participants {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-top: 12px;
    }

    .participant-tile {
      min-height: 42px;
      padding: 6px;
      background: #263238;
      border: 1px solid #455a64;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <main>
    <canvas id="stage" width="1280" height="720" aria-label="Mock meeting video"></canvas>

    <div class="controls">
      <button id="leave-call" type="button" aria-label="Leave call">Leave call</button>
      <button id="caption-update" type="button">Update caption</button>
      <button id="end-meeting" type="button">End meeting</button>
    </div>

    <div id="captions-region" role="region" aria-label="Captions">
      <div class="nMcdL" data-participant-id="alice">
        <div class="NWpY1d">Alice Example</div>
        <div class="ygicle">Initial caption from mocked Meet</div>
      </div>
    </div>

    <div id="participants"></div>
    <div id="ended-state" hidden>You left the meeting Rejoin</div>
  </main>

  <script>
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    let textNode = document.querySelector('.ygicle');
    const leaveButton = document.getElementById('leave-call');
    const captionsRegion = document.getElementById('captions-region');
    const participants = document.getElementById('participants');
    const endedState = document.getElementById('ended-state');
    let frame = 0;
    let animationComplexity = 1;
    let captionSequence = 0;
    let captionTimer = null;
    let replacementTimer = null;
    let markerUntil = 0;

    function draw() {
      if (performance.now() < markerUntil) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        frame += 1;
        requestAnimationFrame(draw);
        return;
      }
      const hue = (frame * 4) % 360;
      ctx.fillStyle = `hsl(${hue}, 58%, 22%)`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#f8fafc';
      ctx.font = '48px Arial';
      ctx.fillText('Mock Google Meet', 48, 92);
      ctx.font = '34px Arial';
      ctx.fillText(`Frame ${frame}`, 48, 154);
      ctx.fillStyle = '#38bdf8';
      ctx.fillRect(48, 210, 220 + ((frame * 9) % 560), 32);
      for (let index = 0; index < animationComplexity; index += 1) {
        ctx.fillStyle = `hsla(${(frame * 7 + index * 31) % 360}, 80%, 55%, 0.55)`;
        ctx.fillRect(
          48 + ((frame * 13 + index * 97) % 1100),
          280 + ((index * 43) % 360),
          16 + (index % 8) * 5,
          16 + (index % 6) * 7
        );
      }
      frame += 1;
      requestAnimationFrame(draw);
    }

    function setCaption(text) {
      textNode.textContent = text;
      textNode.dataset.emittedAt = String(Date.now());
      captionSequence += 1;
    }

    function setParticipants(count) {
      participants.replaceChildren();
      for (let index = 0; index < count; index += 1) {
        const tile = document.createElement('div');
        tile.className = 'participant-tile';
        tile.dataset.participantIndex = String(index);
        tile.textContent = `Participant ${index + 1} frame ${frame}`;
        participants.appendChild(tile);
      }
    }

    function replaceCaptionDom() {
      const current = document.querySelector('.ygicle');
      if (!current) return;
      const replacement = current.cloneNode(false);
      replacement.textContent = current.textContent;
      replacement.dataset.emittedAt = String(Date.now());
      current.replaceWith(replacement);
      textNode = replacement;
    }

    function burstCaptions(count, prefix = 'Burst caption') {
      for (let index = 0; index < count; index += 1) {
        setCaption(`${prefix} ${captionSequence + 1}`);
      }
    }

    function stopWorkload() {
      if (captionTimer) clearInterval(captionTimer);
      if (replacementTimer) clearInterval(replacementTimer);
      captionTimer = null;
      replacementTimer = null;
    }

    function emitHardwareMarker() {
      markerUntil = performance.now() + 500;
      try {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        const audio = new AudioContextCtor();
        const oscillator = audio.createOscillator();
        const gain = audio.createGain();
        oscillator.frequency.value = 1000;
        gain.gain.value = 0.15;
        oscillator.connect(gain);
        gain.connect(audio.destination);
        oscillator.start();
        oscillator.stop(audio.currentTime + 0.35);
        oscillator.addEventListener('ended', () => audio.close());
      } catch {}
    }

    function scheduleHardwareMarker(delayMs) {
      setTimeout(emitHardwareMarker, Math.max(0, delayMs));
    }

    function startWorkload(options = {}) {
      stopWorkload();
      setParticipants(options.participants ?? 1);
      animationComplexity = Math.max(1, options.animationComplexity ?? 1);
      const captionIntervalMs = options.captionIntervalMs ?? 0;
      const replacementIntervalMs = options.replacementIntervalMs ?? 0;
      if (captionIntervalMs > 0) {
        captionTimer = setInterval(() => {
          setCaption(`Sustained caption ${captionSequence + 1}`);
        }, captionIntervalMs);
      }
      if (replacementIntervalMs > 0) {
        replacementTimer = setInterval(replaceCaptionDom, replacementIntervalMs);
      }
    }

    function endMeeting() {
      stopWorkload();
      leaveButton.remove();
      captionsRegion.remove();
      endedState.hidden = false;
    }

    document.getElementById('caption-update').addEventListener('click', () => {
      setCaption(`Updated caption ${Date.now()}`);
    });
    document.getElementById('end-meeting').addEventListener('click', endMeeting);

    window.mockMeet = {
      setCaption,
      setParticipants,
      replaceCaptionDom,
      burstCaptions,
      startWorkload,
      stopWorkload,
      emitHardwareMarker,
      scheduleHardwareMarker,
      endMeeting,
      getStats: () => ({
        frame,
        captionSequence,
        participants: participants.childElementCount,
        animationComplexity,
      }),
    };
    setParticipants(1);
    draw();
  </script>
</body>
</html>
