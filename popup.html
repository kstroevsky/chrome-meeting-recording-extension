<!DOCTYPE html>
<html>
  <head><title>Google Meet Helper</title></head>
  <body>
    <button id="save">Download Transcript</button>
    <hr/>
    <button id="enable-mic">Enable Microphone</button>
    <hr/>
    <select id="storage-mode">
      <option value="local">Save to Local Disk (OPFS)</option>
      <option value="drive">Save to Google Drive (after stop)</option>
    </select>
    <br/><br/>
    <label>
      <input type="checkbox" id="record-self-video" />
      Record my camera separately
    </label>
    <br/>
    <label>
      <input type="checkbox" id="self-video-high-quality" />
      High quality webcam (720p)
    </label>
    <br/><br/>
    <div id="recording-status" style="min-height: 1.5em; font-size: 12px; color: #a15c00;"></div>
    <button id="start-rec">Start Recording</button>
    <button id="stop-rec" disabled>Stop Recording</button>
    <script src="popup.js"></script>
  </body>
</html>
